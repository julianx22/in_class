<header class="site-header" style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
  <a class="brand home-link" href="{% url 'core:root' %}" title="Ir al inicio"
     style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;">
    <span class="home-emoji">🏠</span>
    <span class="home-text">Inicio</span>
  </a>

  {% if request.user.is_authenticated %}
  <a id="notifBtn"
     href="{% url 'core:notificaciones' %}"
     data-api-count="{% url 'core:api_notif_unread_count' %}"
     title="Notificaciones"
     style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:999px;background:rgba(255,255,255,.08);text-decoration:none;">
    <span>🔔</span>
    <span id="notifBadge"
          style="position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ef4444;color:#fff;font:700 12px/18px ui-sans-serif,system-ui;text-align:center;display:none;">
      0
    </span>
  </a>
  {% endif %}
</header>

{% if request.user.is_authenticated %}
<script>
  (function(){
    const btn   = document.getElementById('notifBtn');
    const badge = document.getElementById('notifBadge');
    if(!btn || !badge) return;
    const url = btn.dataset.apiCount;

    async function tick(){
      try{
        const r = await fetch(url, { headers:{ "X-Requested-With":"fetch" }});
        const d = await r.json();
        const n = (d && d.unread) ? parseInt(d.unread,10) : 0;
        if(n > 0){ badge.textContent = n; badge.style.display = 'inline-block'; }
        else{ badge.style.display = 'none'; }
      }catch(_){}
    }
    tick();
    setInterval(tick, 10000); // cada 10s
  })();
</script>
{% endif %}
